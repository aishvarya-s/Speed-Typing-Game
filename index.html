<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">
    <h1>Typing Game</h1>

    <div id="controls">
      <button onclick="startGame(30)">30s</button>
      <button onclick="startGame(60)">60s</button>
      <button onclick="startGame(120)">120s</button>
    </div>

    <p class="timer">Time Left: <span id="time">0</span>s</p>

    <!-- typing text -->
    <p id="text"></p>

    <!-- input -->
    <input type="text" id="input" autofocus placeholder="Start typing..." />

    <!-- stats -->
    <div id="stats">
      <p>WPM: <span id="wpm">0</span></p>
      <p>Accuracy: <span id="accuracy">100</span>%</p>
    </div>

  </div>

  <!-- UPDATED RESULT SCREEN -->
  <div id="result" class="hidden">
    <h2>Results</h2>

    <p>WPM: <span id="final-wpm"></span></p>
    <p>Accuracy: <span id="final-accuracy"></span>%</p>

    <!-- 🧠 NEW: weak keys -->
    <p>Weak Keys: <span id="weak-keys"></span></p>

    <!-- 🔥 NEW: practice button -->
    <button onclick="startPractice()">Practice Weak Keys</button>

    <!-- existing -->
    <button onclick="restartGame()">Play Again</button>
  </div>

  <div id="practice-popup" class="hidden">
    <h2>Practice Complete</h2>
    <p>Do you want to continue practicing?</p>

    <button onclick="continuePractice()">Practice More</button>
    <button onclick="exitPractice()">Back to Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
