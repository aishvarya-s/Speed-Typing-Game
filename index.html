<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game">
    <h1>Typing Game</h1>

    <!-- typing text -->
    <p id="text"></p>

    <!-- input -->
    <input type="text" id="input" autofocus placeholder="Start typing..." />

    <!-- stats -->
    <div id="stats">
      <p>WPM: <span id="wpm">0</span></p>
      <p>Accuracy: <span id="accuracy">100</span>%</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
